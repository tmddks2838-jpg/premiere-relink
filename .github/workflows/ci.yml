name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 도구 설치
        run: pip install ruff pytest pytest-cov
      - name: Lint (ruff)
        run: ruff check .
      - name: 테스트 + 커버리지
        run: pytest -q --cov=engine --cov-report=term-missing:skip-covered
